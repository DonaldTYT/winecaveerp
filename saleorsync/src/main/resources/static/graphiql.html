<!DOCTYPE html><html><head>
  <meta charset="utf-8"/>
  <title>GraphiQL</title>
  <link rel="stylesheet" href="https://unpkg.com/graphiql@1.5.16/graphiql.min.css">
  <style>html,body,#graphiql{height:100%;margin:0}</style>
</head><body>
  <div id="graphiql">Loading…</div>
  <script src="https://unpkg.com/react@16.14.0/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@16.14.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/graphiql@1.5.16/graphiql.min.js"></script>
  <script>
    const gqlFetcher = GraphiQL.createFetcher({ url: "/sync/graphql" });
    ReactDOM.render(React.createElement(GraphiQL, { fetcher: gqlFetcher }), document.getElementById('graphiql'));
  </script>
</body></html>
