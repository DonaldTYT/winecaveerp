# your Saleor GraphQL endpoint
saleor.graphql-url=http://localhost:8000/graphql/

# (these still work when running as a JAR in dev; they are ignored by external Tomcat)
server.port=8081
server.servlet.context-path=/sync

# GraphQL HTTP endpoint (default is /graphql)
spring.graphql.path=/graphql
spring.graphql.graphiql.path=/graphiql
# Built-in GraphiQL UI (handy for testing at /graphiql)
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.cdn.enabled=true   # load GraphiQL assets from CDN
# For Swagger UI (springdoc)
springdoc.api-docs.path=/v3/api-docs
# Boot 2.7: UI at /swagger-ui.html

sync.enabled=false
dbtest.enabled=false


