app.tcp.servers[0].name=bicoreserver
app.tcp.servers[0].port=6021
app.tcp.servers[0].backlog=200
app.tcp.servers[0].workerCore=16
app.tcp.servers[0].workerMax=32
app.tcp.servers[0].queueCapacity=500
app.tcp.servers[0].clientReadTimeoutMs=30000
app.tcp.servers[0].handlerBean=BiRpcServerTcpHandler


app.tcp.servers[1].name=saleorsyncrpc
app.tcp.servers[1].port=6022
app.tcp.servers[1].backlog=200
app.tcp.servers[1].workerCore=32
app.tcp.servers[1].workerMax=64
app.tcp.servers[1].queueCapacity=1000
app.tcp.servers[1].clientReadTimeoutMs=20000
app.tcp.servers[1].handlerBean=rpcServerTcpHandler