<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Blend Image with mix-blend-mode</title>
<style>
  :root { --pattern-size: 220px; }

  .hero {
    position: relative;
    min-height: 100vh;
    display: grid;
    place-items: center;
    color: white;
    overflow: hidden;

    /* gradient + bump map in the container */
    background:
      url("images/steel-metallic-texture-background.jpg") 0 0 / var(--pattern-size) var(--pattern-size) repeat,
      linear-gradient(135deg, #0e3a7a, #0a1e3a 60%, #07142a 100%);
    background-blend-mode: multiply, normal;
  }

  .hero img.laptop {
    position: absolute;
    inset: auto 0 8% 0;            /* center bottom-ish */
    margin: 0 auto;
    width: min(800px, 70vw);
    height: auto;

    /* Blend the image with the background behind it */
    mix-blend-mode: screen;        /* try: lighten, overlay, multiply, soft-light */
    /* Optional finesse */
    filter: drop-shadow(0 20px 30px rgba(0,0,0,.4));
    pointer-events: none;          /* keeps UI clickable if this sits above form */
  }

  h1 { z-index: 1; font: 700 3rem/1 system-ui, sans-serif; }
</style>
</head>
<body>
  <section class="hero">
    <h1>HELLO</h1>
    <img class="laptop" src="images/logo/g2_logo.png" alt="Laptop graphic" />
  </section>
</body>
</html>
