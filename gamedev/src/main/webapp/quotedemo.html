<script>

$(document).ready( function() {
	zk.afterMount(function () {
		console.log('after mount');
		
		//try to move the zul element to summary-container
		var element = $('.summary-items').detach();
		$('.summary-container').append(element);
	});
	
	//adjust position of summary block 
	$('body').scroll(function(){  //after include commonInit document/window selector does not work
	    var st = $(this).scrollTop();
		if (st > 80){
			$(".summary-container").css('margin-top',  st - 80+ 'px');
		}
		else{
			$(".summary-container").css('margin-top',  0+ 'px');
		}
	});
	
	
});

</script>
