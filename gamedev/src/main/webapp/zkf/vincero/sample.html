<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Responsive Bootstrap Grid</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .block {
            width: 200px;
            height: 200px;
            background-color: #007bff;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            margin: auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="text-center my-4">Responsive Grid Layout</h2>
        
        <div class="row justify-content-center">
            <div class="col-lg-3 col-md-4 col-sm-6 col-12 d-flex justify-content-center mb-3">
                <div class="block">Block 1</div>
            </div>
            <div class="col-lg-3 col-md-4 col-sm-6 col-12 d-flex justify-content-center mb-3">
                <div class="block">Block 2</div>
            </div>
            <div class="col-lg-3 col-md-4 col-sm-6 col-12 d-flex justify-content-center mb-3">
                <div class="block">Block 3</div>
            </div>
            <div class="col-lg-3 col-md-4 col-sm-6 col-12 d-flex justify-content-center mb-3">
                <div class="block">Block 4</div>
            </div>
            <div class="col-lg-3 col-md-4 col-sm-6 col-12 d-flex justify-content-center mb-3">
                <div class="block">Block 5</div>
            </div>
            <div class="col-lg-3 col-md-4 col-sm-6 col-12 d-flex justify-content-center mb-3">
                <div class="block">Block 6</div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (Optional, needed for some features like modals) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
