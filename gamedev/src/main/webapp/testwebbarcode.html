<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2D Barcode Scanner - Small Square Preview</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.7/html5-qrcode.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    #scanner-container {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #reader {
      width: 300px;
      height: 300px; /* Perfect square box */
      border: 2px solid #0f0;
      box-sizing: border-box;
    }
    #result {
      margin-top: 20px;
      font-size: 1.5em;
      color: #0f0;
    }
  </style>
</head>
<body>

<h2>Scan a 2D Barcode</h2>

<div id="scanner-container">
  <div id="reader"></div>
</div>

<div id="result">Scanned Code: <span id="barcode-data">None</span></div>

<script>
  function onScanSuccess(decodedText, decodedResult) {
    console.log(`Code matched = ${decodedText}`, decodedResult);
    document.getElementById('barcode-data').textContent = decodedText;
    // Stop scanner after a successful scan
    html5QrCode.stop().then(() => {
      console.log("Scanner stopped after successful scan.");
    }).catch((err) => {
      console.error("Failed to stop scanner: ", err);
    });
  }

  function onScanFailure(error) {
    // You can log errors if needed
    // console.warn(`Scan error: ${error}`);
  }

  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: { width: 250, height: 250 }
    },
    onScanSuccess,
    onScanFailure
  ).catch(err => {
    console.error("Failed to start scanning:", err);
  });
</script>

</body>
</html>
